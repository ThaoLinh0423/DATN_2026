server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Quan trọng: Trình duyệt cần cái này để biết đâu là file JS, đâu là CSS
    include /etc/nginx/mime.types;

    # SPA routing: Nếu không tìm thấy file, trả về index.html cho React Router lo
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BỔ SUNG: Cấm cache index.html để luôn nhận bản build mới nhất ---
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache mạnh các file assets (vì tên file đã có mã hash, không sợ trùng)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip để load web nhanh hơn
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript;
} # Đừng quên dấu đóng ngoặc này nhé!
