  # ==================== WEBSOCKET ====================

  /ws/realtime:
    get:
      tags: [WebSocket]
      summary: Kết nối WebSocket nhận dữ liệu realtime
      description: |-
        Nâng cấp HTTP connection lên WebSocket.
        JWT token truyền qua **query parameter** `token` (không dùng header).

        **URL kết nối:**
        ```
        ws://localhost:8088/v1/ws/realtime?token=<accessToken>
        ```

        ## Lấy sensorId để subscribe

        Gọi `GET /sensors` → lấy `sensorId` (UUID) từ response.
        **Không dùng `deviceId`** — WebSocket subscribe dùng UUID, không phải InfluxDB tag.

        ```
        GET /v1/sensors
        → [{ "sensorId": "a3f2b1c4-...", "deviceId": "esp32_sensor_001", ... }]
        ```

        ## Message từ Client → Server

        **Subscribe 1 sensor (dùng sensorId UUID):**
        ```json
        {"type": "subscribe", "sensorId": "a3f2b1c4-e89b-12d3-a456-426614174000"}
        ```

        **Subscribe nhiều sensors:**
        ```json
        {
          "type": "subscribe",
          "sensorIds": [
            "a3f2b1c4-e89b-12d3-a456-426614174000",
            "b7c3d2e1-f90c-23e4-b567-537725285111"
          ]
        }
        ```

        **Unsubscribe:**
        ```json
        {"type": "unsubscribe", "sensorId": "a3f2b1c4-e89b-12d3-a456-426614174000"}
        ```

        **Ping:**
        ```json
        {"type": "ping"}
        ```

        ## Message từ Server → Client

        **Xác nhận subscribe:**
        ```json
        {"type": "subscribed", "sensorId": "a3f2b1c4-e89b-12d3-a456-426614174000"}
        ```

        **Dữ liệu realtime (push mỗi ≤ 30s):**
        ```json
        {
          "type": "data",
          "sensorId": "a3f2b1c4-e89b-12d3-a456-426614174000",
          "data": {
            "dataPointId": "esp32_sensor_001_1710000000000",
            "sensorId": "esp32_sensor_001",
            "location": "living_room",
            "timestamp": "2024-03-10T08:30:00Z",
            "values": {
              "pm1": 8,
              "pm25": 24,
              "pm10": 35,
              "temperature": 28.5,
              "humidity": 72.0,
              "heatIndex": 31.2,
              "comfort": "Comfortable",
              "aqiStatus": "Good"
            }
          }
        }
        ```

        > **Lưu ý:** `sensorId` trong WebSocket message envelope là UUID (dùng để route đến đúng client).
        > `data.sensorId` bên trong là `sensor_node` tag từ InfluxDB (device_id string) — dùng để hiển thị.

        **Pong:**
        ```json
        {"type": "pong"}
        ```

        ## Keepalive
        Server tự động gửi WebSocket ping frame mỗi **54 giây**.
        Timeout sau **60 giây** không có activity.

        ## Luồng đầy đủ

        ```
        1. GET /v1/sensors → lấy sensorId (UUID) và deviceId của từng sensor
        2. Connect ws://host/v1/ws/realtime?token=<jwt>
        3. Send: {"type":"subscribe","sensorId":"<UUID>"}
        4. Nhận: {"type":"subscribed","sensorId":"<UUID>"}
        5. Mỗi ≤30s nhận: {"type":"data","sensorId":"<UUID>","data":{...}}
        ```
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: query
          required: true
          description: JWT access token (thay cho Authorization header).
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — kết nối WebSocket thành công.
        '401':
          description: Token thiếu hoặc không hợp lệ.

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Dữ liệu đầu vào không hợp lệ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token thiếu hoặc không hợp lệ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không đủ quyền thực hiện.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Không tìm thấy tài nguyên.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Missing required parameter

    RegisterRequest:
      type: object
      required: [email, password, timezone]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        timezone:
          type: string
          example: Asia/Ho_Chi_Minh

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600

    User:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, manager, user]
        timezone:
          type: string
          example: Asia/Ho_Chi_Minh
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSession:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        deviceInfo:
          type: string
        ipAddress:
          type: string
        lastActivity:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Sensor:
      type: object
      properties:
        sensorId:
          type: string
          format: uuid
          description: UUID nội bộ trong PostgreSQL. Dùng để **subscribe WebSocket**.
        name:
          type: string
          example: Cảm biến phòng khách
        deviceId:
          type: string
          description: |-
            Tag `sensor_node` trong InfluxDB.
            Dùng để query `/data/latest` và `/data/historical`.
            **Không dùng để subscribe WebSocket** — dùng `sensorId` (UUID) thay thế.
          example: esp32_sensor_001
        topicPath:
          type: string
          description: "MQTT topic đầy đủ. Pattern: {customerId}/{sensorName}/all"
          example: customer_a/sensor_001/all
        customerId:
          type: string
          example: customer_a
        location:
          type: object
          properties:
            latitude:
              type: number
              format: float
              example: 21.0285
            longitude:
              type: number
              format: float
              example: 105.8542
        ownerId:
          type: string
          format: uuid
        type:
          type: string
          enum: [iot, external_station]
        status:
          type: string
          enum: [active, inactive, maintenance]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SensorInput:
      type: object
      required: [name, deviceId, topicPath, customerId, location, type]
      properties:
        name:
          type: string
        deviceId:
          type: string
          description: Phải khớp với tag `sensor_node` trong InfluxDB (thường lowercase).
          example: esp32_sensor_001
        topicPath:
          type: string
          description: "MQTT topic đầy đủ. Pattern: {customerId}/{sensorName}/all"
        customerId:
          type: string
        location:
          type: object
          required: [latitude, longitude]
          properties:
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
        type:
          type: string
          enum: [iot, external_station]

    DataPoint:
      type: object
      description: Một điểm đo từ cảm biến, lấy từ InfluxDB Cloud.
      properties:
        dataPointId:
          type: string
          description: "Tổng hợp: `{deviceId}_{timestamp_ms}`."
          example: esp32_sensor_001_1710000000000
        sensorId:
          type: string
          description: Giá trị tag `sensor_node` trong InfluxDB (= deviceId).
          example: esp32_sensor_001
        location:
          type: string
          description: Giá trị tag `location` trong InfluxDB.
          example: living_room
        timestamp:
          type: string
          format: date-time
        values:
          type: object
          properties:
            pm1:
              type: number
              example: 8
            pm25:
              type: number
              example: 24
            pm10:
              type: number
              example: 35
            temperature:
              type: number
              example: 28.5
            humidity:
              type: number
              example: 72.0
            heatIndex:
              type: number
              example: 31.2
            comfort:
              type: string
              example: Comfortable
            aqiStatus:
              type: string
              example: Good

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sensorId:
          type: string
          format: uuid
          description: UUID sensor trong PostgreSQL.
        alert_type:
          type: string
          enum: [high_pm25, high_pm10, high_aqi]
        message:
          type: string
        is_active:
          type: boolean
        severity:
          type: string
          enum: [warning, danger]
        value:
          type: number
          format: float
        threshold:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AlertCheckResult:
      type: object
      properties:
        alertCreated:
          type: boolean
        alert:
          allOf:
            - $ref: '#/components/schemas/Alert'
          nullable: true
        message:
          type: string

    AlertStatistics:
      type: object
      properties:
        totalAlerts:
          type: integer
        activeAlerts:
          type: integer
        inactiveAlerts:
          type: integer
        alertsByType:
          type: object
          properties:
            high_pm25:
              type: integer
            high_pm10:
              type: integer
            high_aqi:
              type: integer

    InfluxSettings:
      type: object
      properties:
        settingId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        influxUrl:
          type: string
        influxToken:
          type: string
          description: Bị mask khi GET.
        influxOrg:
          type: string
        influxBucket:
          type: string
        measurement:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InfluxSettingsInput:
      type: object
      required: [influxUrl, influxToken, influxOrg, influxBucket, measurement]
      properties:
        influxUrl:
          type: string
        influxToken:
          type: string
        influxOrg:
          type: string
        influxBucket:
          type: string
        measurement:
          type: string

    InfluxDevice:
      type: object
      properties:
        deviceId:
          type: string
          description: Giá trị tag `sensor_node` trong InfluxDB. Dùng cho `POST /sensors`.
          example: esp32_sensor_001
        location:
          type: string
          example: living_room

    InfluxDiscoverResponse:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/InfluxDevice'
        bucket:
          type: string
        measurement:
          type: string
        total:
          type: integer

    GeneralSettings:
      type: object
      properties:
        settingId:
          type: string
          format: uuid
        siteName:
          type: string
        defaultTimezone:
          type: string
        defaultLanguage:
          type: string
        dateFormat:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GeneralSettingsInput:
      type: object
      properties:
        siteName:
          type: string
        defaultTimezone:
          type: string
        defaultLanguage:
          type: string
        dateFormat:
          type: string

    ThresholdSettings:
      type: object
      properties:
        settingId:
          type: string
          format: uuid
        pm25Warning:
          type: integer
          example: 35
        pm25Danger:
          type: integer
          example: 55
        pm10Warning:
          type: integer
          example: 50
        pm10Danger:
          type: integer
          example: 100
        aqiWarning:
          type: integer
          example: 100
        aqiDanger:
          type: integer
          example: 150
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ThresholdSettingsInput:
      type: object
      properties:
        pm25Warning:
          type: integer
        pm25Danger:
          type: integer
        pm10Warning:
          type: integer
        pm10Danger:
          type: integer
        aqiWarning:
          type: integer
        aqiDanger:
          type: integer

    NotificationSettings:
      type: object
      properties:
        settingId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        emailAlerts:
          type: boolean
        smsAlerts:
          type: boolean
        pushNotifications:
          type: boolean
        alertThreshold:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationSettingsInput:
      type: object
      properties:
        emailAlerts:
          type: boolean
        smsAlerts:
          type: boolean
        pushNotifications:
          type: boolean
        alertThreshold:
          type: integer

    EmailSettings:
      type: object
      properties:
        settingId:
          type: string
          format: uuid
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPassword:
          type: string
          description: Luôn trả về "••••••••"
        fromEmail:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmailSettingsInput:
      type: object
      required: [smtpHost, smtpPort, smtpUser, smtpPassword, fromEmail]
      properties:
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPassword:
          type: string
        fromEmail:
          type: string
          format: email
