openapi: 3.0.3
info:
  title: Air Quality API
  description: |-
    REST API và WebSocket cho hệ thống giám sát chất lượng không khí.

    ## Kiến trúc

    | Layer | Công nghệ | Vai trò |
    |-------|-----------|---------|
    | HTTP API | Go + Gin | REST endpoints |
    | Auth | JWT (HMAC) | Xác thực & phân quyền |
    | Database | PostgreSQL | Users, sensors, alerts, settings |
    | Time-series | InfluxDB Cloud | Dữ liệu đo từ cảm biến |
    | Realtime | WebSocket + Poller | Push dữ liệu mỗi 30s |

    ## Luồng dữ liệu cảm biến

    ```
    ESP32 → MQTT (HiveMQ) → Telegraf → InfluxDB Cloud
                                              ↓
                                     Backend poll mỗi 30s
                                              ↓  lookup device_id → sensor_id (UUID)
                                    WebSocket → Frontend
    ```

    ## Mapping sensor ID

    Hệ thống có 2 loại ID cho sensor:

    | ID | Nguồn | Ví dụ | Dùng ở đâu |
    |----|-------|-------|------------|
    | `sensorId` (UUID) | PostgreSQL | `a3f2b1c4-...` | REST API, WebSocket subscribe |
    | `deviceId` (string) | InfluxDB tag `sensor_node` | `esp32_sensor_001` | Query data, discover |

    **Quy tắc:** Mọi giao tiếp với client đều dùng `sensorId` (UUID). Backend tự xử lý việc mapping sang `deviceId` khi query InfluxDB.

    ## InfluxDB API Key (per-user)

    Mỗi user tự lưu InfluxDB credentials của mình qua `PUT /settings/influx`.
    Sau đó gọi `GET /settings/influx/discover` để tự động phát hiện danh sách cảm biến
    có trong bucket — không cần đăng ký sensor thủ công.

    ## Xác thực

    JWT Bearer token. Lấy từ `POST /auth/login`, gửi kèm mọi request cần auth:
    ```
    Authorization: Bearer <accessToken>
    ```

    ## Phân quyền

    - `user` — đọc dữ liệu, quản lý tài khoản cá nhân, lưu InfluxDB key.
    - `manager` — tất cả quyền user + tạo sensor.
    - `admin` — tất cả quyền + cấu hình hệ thống (ngưỡng, email, general).

  version: 2.2.0

servers:
  - url: http://localhost:8088/v1
    description: Local development
  - url: https://api.yourdomain.com/v1
    description: Production

tags:
  - name: Auth
    description: Đăng ký, đăng nhập, làm mới token.
  - name: Users
    description: Quản lý thông tin cá nhân và phiên đăng nhập.
  - name: Sensors
    description: Quản lý metadata cảm biến trong PostgreSQL.
  - name: Data
    description: Truy vấn dữ liệu realtime và lịch sử từ InfluxDB Cloud.
  - name: Alerts
    description: Cảnh báo tự động khi dữ liệu vượt ngưỡng.
  - name: Settings - InfluxDB
    description: Cấu hình InfluxDB API key và tự động discover cảm biến.
  - name: Settings - System
    description: Cài đặt hệ thống (admin). Ngưỡng cảnh báo, email SMTP, cài đặt chung.
  - name: Settings - User
    description: Cài đặt cá nhân — thông báo.
  - name: WebSocket
    description: Kết nối realtime nhận dữ liệu cảm biến.

paths:

  # ==================== AUTH ====================

  /auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: strongpassword123
              timezone: Asia/Ho_Chi_Minh
      responses:
        '201':
          description: Đăng ký thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  message:
                    type: string
                    example: User registered successfully
              example:
                userId: 123e4567-e89b-12d3-a456-426614174000
                email: user@example.com
                message: User registered successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập, nhận JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: strongpassword123
      responses:
        '200':
          description: Đăng nhập thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Làm mới access token bằng refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token mới (không bao gồm refreshToken).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  tokenType:
                    type: string
                    example: Bearer
                  expiresIn:
                    type: integer
                    example: 3600
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                tokenType: Bearer
                expiresIn: 3600
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== USERS ====================

  /users/me:
    get:
      tags: [Users]
      summary: Xem thông tin bản thân
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thông tin user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Users]
      summary: Cập nhật thông tin cá nhân
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Nguyễn Văn A
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  example: "0912345678"
      responses:
        '200':
          description: Cập nhật thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/change-password:
    post:
      tags: [Users]
      summary: Đổi mật khẩu
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Đổi mật khẩu thành công.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/sessions:
    get:
      tags: [Users]
      summary: Danh sách phiên đăng nhập
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/logout:
    post:
      tags: [Users]
      summary: Đăng xuất phiên hiện tại
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Đăng xuất thành công.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== SENSORS ====================

  /sensors:
    get:
      tags: [Sensors]
      summary: Danh sách cảm biến
      description: |-
        Public endpoint — không cần đăng nhập.
        Trả về metadata của các sensor đã được đăng ký trong PostgreSQL.

        `sensorId` (UUID) là ID dùng để **subscribe WebSocket**.
        `deviceId` là tag InfluxDB dùng để **query /data/latest và /data/historical**.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Danh sách sensor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Sensor'
                  nextCursor:
                    type: string
                    nullable: true

    post:
      tags: [Sensors]
      summary: Đăng ký sensor mới
      description: |-
        Yêu cầu quyền `admin` hoặc `manager`.

        `deviceId` phải khớp chính xác với tag `sensor_node` trong InfluxDB (thường là lowercase).
        Dùng `GET /settings/influx/discover` để lấy danh sách `deviceId` có sẵn.

        Sau khi tạo thành công, sensor được **đăng ký vào Realtime Poller ngay lập tức**
        mà không cần restart server.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorInput'
            example:
              name: Cảm biến phòng khách
              deviceId: esp32_sensor_001
              topicPath: customer_a/sensor_001/all
              customerId: customer_a
              location:
                latitude: 21.0285
                longitude: 105.8542
              type: iot
      responses:
        '201':
          description: Tạo thành công. Sensor được poll ngay ở lần tick tiếp theo (≤ 30s).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==================== DATA ====================

  /data/latest:
    get:
      tags: [Data]
      summary: Điểm đo mới nhất của một cảm biến
      description: |-
        Trả về bản ghi mới nhất từ InfluxDB Cloud trong vòng **5 phút** gần nhất.

        **Parameter chính:** `sensorNode` — tương ứng với tag `sensor_node` trong InfluxDB
        (= `deviceId` của sensor, thường là lowercase, ví dụ `esp32_sensor_001`).

        **Các chỉ số trả về:**
        - `pm1`, `pm25`, `pm10` — bụi mịn (µg/m³)
        - `temperature` — nhiệt độ (°C)
        - `humidity` — độ ẩm (%)
        - `heatIndex` — chỉ số nhiệt / cảm giác nhiệt độ (°C)
        - `comfort` — mức thoải mái: `Comfortable`, `Hot`, `Very Hot`...
        - `aqiStatus` — trạng thái AQI: `Good`, `Moderate`, `Unhealthy`...
      security:
        - bearerAuth: []
      parameters:
        - name: sensorNode
          in: query
          required: true
          description: Tag `sensor_node` trong InfluxDB (= `deviceId` của sensor).
          schema:
            type: string
            example: esp32_sensor_001
      responses:
        '200':
          description: Điểm đo mới nhất.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Không có dữ liệu trong 5 phút gần nhất.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/historical:
    get:
      tags: [Data]
      summary: Dữ liệu lịch sử theo khoảng thời gian
      description: |-
        Truy vấn InfluxDB Cloud theo `deviceId` và khoảng thời gian.

        Thời gian theo định dạng **RFC3339**: `2024-01-01T00:00:00Z`.

        Kết quả được sắp xếp mới nhất trước (`desc`). Tối đa **1000** điểm mỗi request.
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: query
          required: true
          description: Tag `device_id` trong InfluxDB (= `deviceId` của sensor).
          schema:
            type: string
            example: esp32_sensor_001
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2024-03-01T00:00:00Z"
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2024-03-02T00:00:00Z"
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Danh sách điểm đo lịch sử.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataPoint'
                  nextCursor:
                    type: string
                    nullable: true
                    description: Luôn null — InfluxDB dùng time range thay vì cursor.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== ALERTS ====================

  /alerts:
    get:
      tags: [Alerts]
      summary: Danh sách cảnh báo
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Lọc theo trạng thái.
          schema:
            type: string
            enum: [all, active, inactive]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Danh sách alerts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /alerts/statistics:
    get:
      tags: [Alerts]
      summary: Thống kê tổng hợp cảnh báo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thống kê.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertStatistics'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /alerts/check:
    post:
      tags: [Alerts]
      summary: Kiểm tra giá trị và tạo alert thủ công
      description: |-
        So sánh giá trị đầu vào với `ThresholdSettings`, tạo alert nếu vượt ngưỡng.
        Thông thường alert được tạo **tự động** bởi RealtimePoller mỗi 30s.
        Endpoint này dùng để test hoặc tích hợp nguồn dữ liệu ngoài.

        **Logic ưu tiên:** PM2.5 → PM10 → AQI (chỉ tạo 1 alert mỗi lần check).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sensorId]
              properties:
                sensorId:
                  type: string
                  format: uuid
                  description: UUID sensor trong PostgreSQL.
                pm25:
                  type: number
                  format: float
                  example: 80.0
                pm10:
                  type: number
                  format: float
                  example: 120.0
                aqi:
                  type: number
                  format: float
                  example: 180.0
      responses:
        '200':
          description: Kết quả kiểm tra.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertCheckResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /alerts/bulk/update-status:
    post:
      tags: [Alerts]
      summary: Cập nhật trạng thái nhiều alerts cùng lúc
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alertIds, is_active]
              properties:
                alertIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-1", "uuid-2"]
                is_active:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Số alert đã cập nhật.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedCount:
                    type: integer
                    example: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /alerts/{alertId}:
    get:
      tags: [Alerts]
      summary: Chi tiết một alert
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: Chi tiết alert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Alerts]
      summary: Cập nhật trạng thái một alert
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AlertId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Alert sau khi cập nhật.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Alerts]
      summary: Xóa alert
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: Xóa thành công.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== SETTINGS — INFLUXDB ====================

  /settings/influx:
    get:
      tags: [Settings - InfluxDB]
      summary: Xem InfluxDB settings của bản thân
      description: |-
        Trả về cấu hình InfluxDB Cloud đã lưu.
        **Token bị mask:** chỉ hiển thị 4 ký tự đầu và 4 ký tự cuối.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: InfluxDB settings (token masked).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfluxSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Chưa cấu hình InfluxDB settings.

    put:
      tags: [Settings - InfluxDB]
      summary: Lưu hoặc cập nhật InfluxDB API key
      description: |-
        Lưu InfluxDB credentials vào tài khoản.
        API sẽ **tự động ping InfluxDB** để kiểm tra kết nối trước khi lưu.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfluxSettingsInput'
      responses:
        '200':
          description: Lưu thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfluxSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Settings - InfluxDB]
      summary: Xóa InfluxDB settings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Đã xóa.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settings/influx/discover:
    get:
      tags: [Settings - InfluxDB]
      summary: Tự động discover danh sách cảm biến từ InfluxDB
      description: |-
        Dùng API token đã lưu để query schema InfluxDB, trả về tất cả `sensor_node`
        có dữ liệu trong **30 ngày** gần nhất.

        Kết quả `deviceId` trong response = tag `sensor_node` trong InfluxDB.
        Dùng giá trị này để:
        - Query `/data/latest?sensorNode=<deviceId>`
        - Đăng ký sensor vào PostgreSQL qua `POST /sensors` (`deviceId` field)

        **Yêu cầu:** phải cấu hình InfluxDB settings trước qua `PUT /settings/influx`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách devices phát hiện được.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfluxDiscoverResponse'
              example:
                devices:
                  - deviceId: esp32_sensor_001
                    location: living_room
                  - deviceId: esp32_sensor_002
                    location: bedroom
                bucket: SENSOR
                measurement: sensor_data
                total: 2
        '400':
          description: Chưa cấu hình InfluxDB settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Lỗi khi query InfluxDB.

  # ==================== SETTINGS — SYSTEM ====================

  /settings/general:
    get:
      tags: [Settings - System]
      summary: Cài đặt chung của hệ thống (public)
      responses:
        '200':
          description: Cài đặt chung.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'

    put:
      tags: [Settings - System]
      summary: Cập nhật cài đặt chung (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneralSettingsInput'
      responses:
        '200':
          description: Đã cập nhật.
          content:
            application/json:
              schema:
